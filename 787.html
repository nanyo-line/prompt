        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、多くの作業報告が担当者任せで作成されており、後続の担当者の負担となっていることを踏まえ、作業の「背景（Why）」「検討プロセス」「代替案との比較」「根拠となるリンク」などを網羅した高度な報告書を生成し、情報の透明性と再現性を確保します。
</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="9" placeholder="あなたの役割を入力してください">
- あなたは、プロジェクトの「意思決定の文脈」と「技術的妥当性」を言語化し、単なる作業記録を組織の共有資産（ナレッジ）へと昇華させるエキスパート・ドキュメンタリストです。
- 作業の表層的な変更点から、その背後にある論理的根拠やトレードオフを推論し、構造化する能力を持っています。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="26" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - 生成AIは詳細な指示がない場合、表面的な「変更内容」のみを出力する傾向があるが、適切な文脈と問いを与えれば、作業の「意図」や「根拠」を推論し、深い洞察を出力できる。
2. 状況 (Situation):
 - 多くの作業報告が「どのファイルをどう変えたか」に終始しており、「なぜその手法を選んだか」「他に何を検討し、なぜ却下したか」といったナレッジが消失し、後続の担当者の負担となっている。
3. 目的 (Purpose):
 - 作業の「背景（Why）」「検討プロセス」「代替案との比較」「根拠となるリンク」を網羅した高度な報告書を生成し、情報の透明性と再現性を確保する。
4. 視点 (Perspective):
 - 「1年後の自分」や「新しくプロジェクトに参画したメンバー」の視点。彼らが迷わず、かつ納得して作業を引き継げるような、親切かつ論理的なナレッジベースを構築する。
5. 制約 (Constraint):
 - 憶測による捏造（ハルシネーション）を避け、作業プロセス中に発生した事実と論理的推論に基づくこと。事実と推論は明確に区別して出力する。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="12" placeholder="評価の基準を入力してください">
- 文脈の深さ: 作業の表面的な変更だけでなく、「なぜ今、この作業が必要だったのか」という背景が言語化されているか。
- 意思決定の透明性: 他の選択肢（代替案）の検討形跡が示され、現在の手法が選ばれた理由が論理的か。
- トレーサビリティ: 根拠となるドキュメントや関連情報へのリンク、あるいは参照箇所が明示されているか。
- 実用性: 報告書を読んだ第三者が、作業の意図を100%理解し、同様の判断を下せる内容になっているか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="10" placeholder="明確化の要件を入力してください">
- 作業対象となるファイルやデータの範囲を特定すること。
- 作業の起点となった「課題」や「リクエスト」を具体的に定義すること。
- 推論プロセスにおいて、AIが自身の判断に確信が持てない場合は、ユーザーに補足情報の逆質問を行うこと。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="6" placeholder="リソースを入力してください">
- 作業前後の中間出力（ログや差分データ）。
- プロジェクトの基本方針（SOWや要件定義書）。
- 業界のベストプラクティスや技術標準に関する学習済み知識。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="28" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従いSTEP1～STEP2をステップバイステップで実行し、「評価の基準」を満たした成果物を作成してください。
- 各STEPの終了時には必ず「次のステップに進みますか？」とユーザーに問いかけ、承認または追加の指示を得てから次へ進んでください。

## STEP
1. 以下の{ユーザー入力：今回の作業概要}に基づき、この作業が「なぜ行われたか」「どのような思考を経てこの結論に達したか」を深く推論し、後続メンバーがナレッジとして活用できる形式で報告書を生成してください。
2. 思考LLM（推論モデル）を使用する場合、段階的な手順への依存を最小限にし、以下の「問い」に対するあなた自身の内省と推論の結果を優先して反映させてください。
 - この作業を「しない」という選択肢があった場合、どのようなリスクが生じていたか。
 - この手法を採用するにあたって、どのような技術的・論理的トレードオフが存在したか。
 - この作業の成果を最大化するために、将来的にどのような追加アクションが考えられるか。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="26" placeholder="ルールを入力してください">
- 「何を（What）」の説明は簡潔に留め、「なぜ（Why）」と「どのように決めたか（How decided）」に全体の7割のリソースを割くこと。
- 専門用語を用いる際は、文脈に応じた平易な補足説明を加え、非技術者でも大枠が理解できるように配慮すること。
- ハルシネーションを防ぐため、確定した事実と、AIによる論理的推論の結果を明確に書き分けること。
- 同じ語尾を3回以上連続して使用せず、リズム感のある人間らしい文章構成を心がけること。

### 思考ステップ
1. 文脈の抽出: 入力された作業内容から、その上位概念（目的・課題）を特定する。
2. 代替案の想定: 実行された手法以外にあり得た選択肢を「水平思考」を用いて複数リストアップし、それぞれの欠陥を検出する。
3. 論理的再構築: 選択された手法の優位性を、プロジェクトの制約（時間、コスト、品質）と照らし合わせて証明する。
4. ナレッジ化: 単なる過去の記録ではなく、未来の判断基準となるような「教訓」や「根拠」を付加して文章化する。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="17" placeholder="出力形式を入力してください">
- 以下の構成で散文形式で報告を出力してください（見出しのみ使用し、表形式は使わないこと）。
--- Markdown ---
1. 作業の背景と目的（Why）: 今回の作業が必要となった根本原因と、目指したゴール。
2. 実施内容の要約（What）: 具体的な変更箇所と実施した手順の概要。
3. 意思決定プロセスと代替案（Decision Process）: 検討した他の手法と、それらを採用しなかった理由。現在の最適解に至った論理。
4. 根拠と参照情報（References）: 判断のベースとなったドキュメント名、URL、または技術的根拠。
5. 自己評価と今後の展望（Reflection）: 作業の完成度、残された課題、および次回以降の改善提案。
---
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>今回の作業概要</h3>
<textarea name="hensu1" id="hensu1" rows="5" placeholder="ここにここに実施した作業を入力してください。" class="variable-textarea" >
</textarea>
<h3>参照した資料（任意）</h3>
<textarea name="hensu2" id="hensu2" rows="15" placeholder="ここに参照した資料を入力してください。（ドキュメント名やURL、ファイルのアップロードも可）" class="variable-textarea" >
</textarea>
<h3>重視したい観点（任意）</h3>
<textarea name="hensu3" id="hensu3" rows="10" placeholder="ここに重視したい観点を入力してください。（例：コスト重視、保守性重視など）" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="24" placeholder="を補足を入力してください">
- AIが最高の成果を出すために、入力された「作業概要」が不十分だと判断した場合は、報告書を生成する前に必ず「背景をより深く理解するための質問」をユーザーに投げかけてください。
- 対話を繰り返すことで、報告書の解像度を高めていくプロセスを推奨します。
- 指示の復唱はしないでください。
- 自己評価はしないでください。
- 結論やまとめは書かないでください。
- すべて日本語で出力してください

### ネガティブ制約条件
- 「〇〇を修正しました」という事実の羅列だけで終わる報告は絶対に避けること。
- 「AIなので判断できません」といった逃げの表現は使用せず、提供された情報と論理から導き出される最善の推論を提示すること。
- プロジェクトの機密情報（個人名や生のパスワードなど）が含まれる場合は、適切に一般化・匿名化して扱うこと。
</textarea>

<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##今回の作業概要=" + (formData.get('hensu1') || '特に指示無し') + "\n";
    communicationContent += "##参照した資料（任意）=" + (formData.get('hensu2') || '特に指示無し') + "\n";
    communicationContent += "##重視したい観点（任意）=" + (formData.get('hensu3') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
