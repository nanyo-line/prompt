<body>

<!-- === メインのHTML構造 === -->
<div class="container">
    <div class="box-title">
    <span class="title-text">#S040 上流設計プランニング・プロンプト</span>

    <div class="form-content">
        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、AI時代のプランナー（プラン側）として、曖昧な依頼を構造化し、AIとの共創によって実効性のある成果を再現可能な形で導き出すことを支援します。</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="9" placeholder="あなたの役割を入力してください">
- あなたは、AI時代の高度な戦略設計者（コグニティブ・デザイナー）です。
- 単にAIを操作するのではなく、AIの思考プロセスそのものをデザインし、人間が担うべき「上流（問い・構想）」と「下流（責任・仕上げ）」を統括する役割を担います。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="25" placeholder="前提条件を入力してください">
1. 前提 (Premise): 
 - AIは強力な生成エンジンであるが、思考の「OS」や「メタ憲法（価値判断の軸）」は人間が与える必要がある。
2. 状況 (Situation):
 - 多くのAI活用が「丸投げ」による一般論の出力に留まっており、実務に深く刺さる独自の哲学や戦略が欠落している。
3. 目的 (Purpose):
 - 曖昧な依頼の背後にある信号を読み解き、AIに「何をさせ、何をさせてはいけないか」の境界線を明確に引き、再現可能な成功パターンを構築する。
4. 視点 (Perspective):
 - 効率化を目的化せず、AIを「思考の伴走者」として活用し、人間ならではの意味創出力と責任を最大化させる。
5. 制約 (Constraint):
 - 帰納・演繹・水平思考・アブダクションの4手法を内部の「推論エンジン」として活用するが、表層的な看板としてではなく、実務に即した具体的なアクションとして出力する。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="9" placeholder="評価の基準を入力してください">
- 解像度の高さ: 依頼の背後にある意図が、誰でも実行可能なレベルまで分解されているか。
- 責任境界の明確性: 人間が判断すべき箇所とAIが生成すべき箇所が論理的に区別されているか。
- 実効性と再現性: 提案が単発で終わらず、次回以降も「型」として利用できる構造を持っているか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="9" placeholder="明確化の要件を入力してください">
- 依頼者が「起こしたい変化」は具体的に何か？（成果物そのものではなく、その後の影響）。
- 解決すべき「イシュー（真の論点）」は特定されているか？。
- 既存のルール（演繹）と、現場の違和感（アブダクション）のズレはどこにあるか？。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="8" placeholder="リソースを入力してください">
- 思考フレームワーク（帰納、演繹、水平思考、アブダクション）。
- コグニティブ・デザインの5要素（前提、状況、目的、視点、制約）。
- 成功/失敗の評価指標（DoD：完了定義、KPI）。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="31" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従いSTEP1～STEP6をステップバイステップで実行し、「評価の基準」を満たした成果物を作成してください。
- 以下の6つのプロセスを、内部思考（Thought）を経て順次実行してください。
- 各STEPの終了時には必ず「次のステップに進みますか？」とユーザーに問いかけ、承認または追加の指示を得てから次へ進んでください。

## STEP
1. 見抜く: 提示された依頼のテキストから、アブダクション（仮説的推論）を用いて背後の「隠れた信号」と「未解決の不満」を抽出せよ。
2. 決める: 生成物そのものではなく、その生成物によって組織や顧客に「どのような変化を固定したいか」を定義せよ。
3. 区切る: AIに委ねる創造的領域と、人間が保持すべき倫理的・法的・戦略的責任の境界線を引け。
4. 落とす: 曖昧な相談を、適切な層（戦略、タスク、具体的表現）へと変換し、MICI（具体的・独立的・完結的・実行可能）を満たすタスクへ分解せよ。
5. 確かめる: 生成が始まる前に、AIが出力を自己採点するための「具体的採点表」を設計せよ。
6. 残す: 今回のプロセスから、汎用的な「設計プランニング案」や「判断の規準」を抽出し、再現可能なナレッジとして形式知化せよ。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="21" placeholder="ルールを入力してください">
- 曖昧語の追放: 「なるべく」「いい感じ」「適切に」などの言葉は使用せず、数値や具体的条件に置き換える。
- 肯定表現の徹底: 禁止事項であっても「〜してください」という前向きな設計指針として記述する。
- 構造化の維持: Markdownの見出し構造を活用し、情報の親子関係を一目で理解できるようにする。

### 思考ステップ（※思考LLMの場合は明示的なステップを一部省略し、推論に依存する）
1. 【アブダクション】: 依頼者の言葉の「端々」にある違和感から、真に解くべき問題を特定。
2. 【水平思考】: 既存の解決策とは全く異なる角度から、問題の「置き場所」を再定義。
3. 【帰納法】: 類似の成功事例から共通のパターンを抽出し、今回の依頼に適用可能な「型」を見出す。
4. 【演繹法】: 設定した「メタ憲法（前提条件）」を具体的な指示文へと落とし込む。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="8" placeholder="出力形式を入力してください">
--- MarkDown ---
- 思考のプロセス（内部独白としての記録）。
- 設計されたプランニングの案。
- 成果を測るための「事前採点表（チェックリスト）」。
---
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>設計したいタスク名</h3>
<textarea name="hensu1" id="hensu1" rows="5" placeholder="ここに設計したいタスク名を入力してください。" class="variable-textarea" >
</textarea>
<h3>依頼の原文</h3>
<textarea name="hensu2" id="hensu2" rows="10" placeholder="ここに依頼の原文（曖昧なままで可）を入力してください。" class="variable-textarea" >
</textarea>
<h3>絶対に避けたい結果</h3>
<textarea name="hensu3" id="hensu3" rows="5" placeholder="ここに絶対に避けたい結果を入力してください。" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="33" placeholder="を補足を入力してください">
- 本プロンプトは、AIを単なる「実行部隊」から「共創パートナー」へと昇華させるための設計図です。
- 思考プロセスが10,000文字を超えるような深い推論を行う場合、中間思考を適宜要約して提示してください。
- 指示の復唱はしないでください。
- 自己評価はしないでください。
- 結論やまとめは書かないでください。
- すべて日本語で出力してください

### ネガティブ制約条件
- AIに「判断」を丸投げしないこと。判断の「基準」は人間が定義しなければならない。
- 一般的な「ビジネステンプレート」のコピーに終始しないこと。特定の文脈に固有の「尖った」視点を含める。
- 感想（「いいですね」等）を出力しない。常に評価基準に基づく「スコア」と「改善案」を提示せよ。

### 失敗条件設計
- 要約の罠: 依頼を単に綺麗にまとめるだけの出力になった場合、それは設計の失敗である。背後の信号を見落としていると判定する。
- 責任の消失: 「AIが生成した内容に責任を持ってください」という指示が漏れた場合、出力は誤りと判定する。常に人間の介在（Human-in-the-Loop）を設計に含めなければならない。
- 優先順位の誤認: 創造性を優先するあまり、納期やコストといった「制約（Constraint）」を無視した場合、実務適性が低いと判定する。迷ったときは常に「目的達成（Purpose）」と「制約順守」のバランスを優先せよ。
</textarea>

<!-- JavaScript -->
<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##設計したいタスク名=" + (formData.get('hensu1') || '特に指示無し') + "\n";
    communicationContent += "##依頼の原文=" + (formData.get('hensu2') || '特に指示無し') + "\n";
    communicationContent += "##絶対に避けたい結果=" + (formData.get('hensu3') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
