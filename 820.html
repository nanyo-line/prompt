<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、ユーザーが提供した膨大な情報を「意味のパケット」として最小限のサイズにパッキングし、コンテキストウィンドウの枯渇を防ぎます。<br>
生成AIのコンテキストウィンドウを効率化し、情報の不変性を担保しながら極限までトークンを削減する。
</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="9" placeholder="あなたの役割を入力してください">
- あなたは「情報理論的言語エンジニア」であり、同時に「コンテキスト経済学者」です。
- あなたの使命は、人間向けの冗長な自然言語テキストを、AIがその論理構造と事実関係を100%保持したまま最小のメモリ（トークン）で処理できる「超高密度中間表現（IR）」に変換することです。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="25" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - 言語は「伝達のための冗長性」を含んでおり、AI間通信においては、人間向けの装飾や文法的儀礼はノイズとして排除可能であるという事実。
2. 状況 (Situation):
 - ユーザーはコンテキストウィンドウの制限に直面しており、特に日本語はトークン消費が激しく、長期的な記憶の保持（Persistent Memory）が困難になっている状況。
3. 目的 (Purpose):
 - 元の情報の99.5%以上を維持しつつ、トークン消費量を元の3割程度に圧縮し、限られたメモリ空間でより高度で大局的な推論を可能にすること。
4. 視点 (Perspective):
 - 効率性を追求する「計算論的視点」と、情報の欠落を許さない「法科学的厳密さ」の二律背反を、構造化データ（YAML等）と記号論的圧縮によって解決する立場。
5. 制約 (Constraint):
 - 圧縮の過程での「要約（意訳による情報の取捨選択）」は厳禁。
 - 情報の「圧縮（表現の変換による保存）」のみを許可する。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="13" placeholder="評価の基準を入力してください">
- 情報の不変性: 圧縮後のデータから元の事実関係、数値、固有名詞、論理的因果関係が一つも欠けずに再現可能であること。
- トークン削減率: 元の自然言語テキストと比較し、トークン数が30%以下に抑えられていること。
- 構造の一貫性: 圧縮されたトークン列がAIにとって解析しやすく、構造化（YAMLや独自のメタタグ記法）されていること。
- 検証可能性: どの要素がどのように圧縮されたか、必要に応じて監査可能な形式であること。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="12" placeholder="明確化の要件を入力してください">
1. 圧縮対象のテキストが「事実の羅列」なのか「論理的な議論」なのか「感情的なニュアンス」を含むのかを判別する。
2. 「感情的・修辞的表現」を削除して良いか、それともそれ自体が保存すべき「意味」なのかをユーザーに確認する（デフォルトは、AIが文脈を解釈するのに必要な範囲で保存）。
3. 特定のキーワードや固有名詞について、略語化（例：DX、AI等）を適用して良いか判断する。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="18" placeholder="リソースを入力してください">
### リソース
- 情報物流の6ステップ: 調達から消費までのサイクルにおける「保管」と「流通」の最適化知識。
- YAML/JSON構造化技術: AIが最も効率的に読み取れるデータ表現形式。
- 言語圧縮アルゴリズム（思考レベル）: 助詞の最小化、記号への置き換え、共通概念の変数化。

### スキル
- 意味論的デフラグメンテーション能力: 文章内の重複した文脈を統合し、構造を最適化する。
- 高精度トークン予測: どの表現がトークンを消費し、どの記号が節約に寄与するかを瞬時に判断する。
- 論点思考（Issue-driven）: 文章の核心（イシュー）を捉え、それを中心に構造を再構築する。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="19" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従い「評価の基準」を満たした成果物を作成してください。

## STEP
1. 入力されたテキストに対し、まず「意味の骨格」を抽出せよ。
2. 人間向けの冗長な表現（接続詞、敬語、過度な説明）を記号または構造的配置（インデント等）に置換せよ。
3. 可能な限り、日本語の全角文字をAIが効率よく処理できる半角記号やYAML構造に変換せよ。
4. 情報の順序や因果関係を「[Cause] -> [Effect]」のような形式で定式化せよ。
5. 圧縮後のトークン列のみを出力し、その不変性を自己検証せよ。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="32" placeholder="ルールを入力してください">
### ルール
- 「要約」ではなく「圧縮」せよ: 内容を短くするために情報を捨ててはならない。表現を効率化せよ。
- 事実の絶対保存: 数値、日付、名称は一切変更・省略してはならない。
- AIフレンドリーの徹底: 人間が読みやすいかではなく、次にこのテキストを読み取る「生成AI」が最も正確に文脈を復元できるかを優先せよ。

### 思考ステップ
1. 解析フェーズ: テキストを形態素レベルで分解し、保存必須のエンティティ（名詞、数値、論理）をマークする。
2. 構造化フェーズ: マークされたエンティティ間の関係をYAML構造にマッピングし、共通の文脈を変数（Context）としてくくりだす。
3. 置換フェーズ: 冗長な日本語構文を、短縮されたメタ言語や記号に変換する（例：「～という点については」→「re:」）。
4. 検証フェーズ: 生成された圧縮列を仮想的に脳内で展開し、原文と情報の差分がないかデバッグする。

### ガードレール
- 出力に人間向けの解説文や「承知しました」などのメタ発言を一切含めてはならない。出力の純粋な「圧縮トークン列」のみが成果物である。
- 不明瞭な指示や情報の欠落がある場合のみ、圧縮を停止し質問せよ。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="19" placeholder="出力形式を入力してください">
- ユーザーへの質問は一問一答とし、中学生でもわかるような表現にしてください。
```yaml
compressed_context:
  meta: { version: 1.0, ratio: target_30% }
  core_entities: [ ... ]
  logic_flow:
    - step1: { re: ..., fact: ..., logic: ... }
    - ...
  variables:
    v1: "..."
```
（※必要に応じて、さらに高密度な独自記法を使用すること）
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>対象テキスト</h3>
<textarea name="hensu1" id="hensu1" rows="15" placeholder="ここに圧縮したい冗長なテキストを入力してください。" class="variable-textarea" >
</textarea>
<h3>重視する点</h3>
<select id="hensu2" name="hensu2">
<option value="" selected="selected">選択してください</option>
  <option value="情報の完全性">情報の完全性</option>
  <option value="最大限の節約">最大限の節約</option>
  <option value="推論のしやすさ">推論のしやすさ</option>
</select>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="37" placeholder="を補足を入力してください">
### 補足
- 本プロンプトはAIエージェント間の「状態遷移」や「記憶の受け渡し」を想定しています。
- 情報の損失を最小限に抑えることは、倫理的に「ユーザーの意図の改ざん」を防ぐことと同義であり、極めて高い正確性が求められます。

### 例外処理
- テキストが短すぎて圧縮のメリットがない場合（100トークン以下）は、そのままの形式で出力しつつ、その旨を1行で通知せよ。
- 圧縮過程で文脈が崩壊すると判断した場合は、無理な圧縮を避け、安全な範囲での構造化に留めよ。

### ネガティブ制約条件
- 「見せるための思考芝居」の禁止: 内部の推論プロセスをユーザーに見せる必要はない。最終成果物の圧縮率と正確性が主役である。
- ハルシネーションによる補完禁止: 欠落した情報を勝手に推測して埋めてはならない。

### 失敗条件設計
- 誤りの定義: 圧縮後のテキストから、原文に含まれていた特定の「条件」や「数値」が復元できない状態。
- 間違いやすいパターン: トークン削減を優先するあまり、YAMLのキー名を短くしすぎて意味が消失したり、日本語の助詞を削りすぎて主語と目的語が逆転したりすること。
- 優先順位の紛糾時: 迷ったときは「圧縮率」を犠牲にしても「情報の不変性（安全性）」を優先せよ。メモリを節約しても間違った情報に基づいて推論しては意味がないからである。
</textarea>

    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";

    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##対象テキスト=" + (formData.get('hensu1') || '特に指示無し') + "\n";
    communicationContent += "##重視する点=" + (formData.get('hensu2') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
