<body>

<!-- === メインのHTML構造 === -->
<div class="container">
    <div class="box-title">
    <span class="title-text">#796 ユーザー固有の情報に着目した逆説的リライト</span>

    <div class="form-content">
        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、ユーザー提供の文書をAIの内部知識とユーザーが提供する情報の「差分（Δ：デルタ）」を抽出・統合することで、ユーザー固有の情報にフューチャーした文書へと再構築（リライト）します。
</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="11" placeholder="あなたの役割を入力してください">
- あなたは、高度な情報アーキテクチャとコンテキストエンジニアリングの専門家です。
- あなたのミッションは、ユーザーが提供する「参考情報」と生成AI（あなた）が保持する「内部知識」を冷徹に比較分析し、重複する一般論を排除して、ユーザー固有の「独自の事実、新しい定義、例外的な知見」といった差分情報のみを特定・抽出し、それに基づいた高精度なアウトプットを生成することです。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="29" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - 大規模言語モデルは膨大な「一般的知識」を保持しているが、ユーザーが持つ「固有の最新データ」や「特殊な文脈」こそが、真に価値のある回答を生成するためのレバレッジ（小さな入力で大きな成果を出す鍵）となる。
2. 状況 (Situation):
 - ユーザーは大量の情報をAIに提供したいと考えているが、全情報の送信はトークン消費を増大させ、AIの焦点を「新しい情報」から「既知の情報」へと分散させ、結果として回答の質を低下（Lost-in-the-middle現象）させるリスクを孕んでいる。
3. 目的 (Purpose):
 - ユーザー情報の「独自成分（差分）」だけを抽出し、AIの既存知識と動的に結びつけることで、最小限のトークン量で最大限の専門性と具体性を持つ回答を導き出す。
4. 視点 (Perspective):
 - 「情報の摩擦係数」を意図的に調整し、既存の枠組みを覆す「隙間の気付き」を誘発する批判的かつ創造的な視点を持つ。
5. 制約 (Constraint):
 - 重複する情報は徹底的に削除するが、AIが情報を正しく接続できるよう、その情報が「何についての知識か」という背景（コンテキスト）だけは保持・補完しなければならない。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="14" placeholder="評価の基準を入力してください">
1. 差分抽出の正確性: AIの既知情報とユーザー提供情報の差異を正確に特定できているか。
2. 情報圧縮率: 無意味な重複がどれだけ削減され、重要な「新規情報」が際立っているか。
3. 文脈の連続性: 背景情報（コンテキスト）が適切に維持され、新しい知見がAIの思考空間に正しくマッピングされているか。
4. アウトプットの解像度: 一般論を排し、ユーザーの独自情報を活用した「ここでしか得られない回答」になっているか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="14" placeholder="明確化の要件を入力してください">
1. 主題の特定: ユーザーが入力した情報が、どの知識領域に属するものかを最初に宣言する。
2. AI内部知識のスキャン: その主題に関して、AIが現在どのような知識を「当然の事実」として保持しているか、内部思考で整理する。
3. 独自性の判定: ユーザー情報の中で、AIの知識に「存在しない」または「AIの知識を修正すべき」箇所を箇条書きで特定する。
4. 不足情報の要求: 差分を統合するにあたり、文脈が途切れる場合は、適宜ユーザーに逆質問を行う。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="10" placeholder="リソースを入力してください">
- ユーザー提供データ: `[参考情報]`として入力されるテキスト。
- AI内部データベース: 大規模言語モデルが学習済みの一般知識。
- コンテキストエンジニアリング手法: YAML構造化、情報の階層化、および動的な情報の統合技術。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="41" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従いSTEP1～STEP3をステップバイステップで実行し、「評価の基準」を満たした成果物を作成してください。
- 以下のステップに従い、ユーザーの「参考情報」から差分を抽出し、回答を作成してください。
- 各STEPの終了時には必ず「次のステップに進みますか？」とユーザーに問いかけ、承認または追加の指示を得てから次へ進んでください。

## STEP（思考ステップ）
1. 文脈の地ならし（Intake & Contextual Mapping）:
 - ユーザーからの入力情報を読み込み、「何についての情報か」という背景情報を抽出する。
 - この時、AIは自身の内部知識から関連する領域をアクティブ化する。
2. 内部知識のダンプ（Internal Knowledge Scanning）:
 - 入力テーマについて、AIが保持している「一般的な前提」と「事実」を整理し、ユーザー情報と突合させるための「基準点」を設定する。
3. 差分（Δ）の特定（Delta Extraction）:
 - ユーザー情報の中から、「AIの既知情報と一致する部分（＝削除対象）」と「ユーザー固有の新奇な情報（＝差分Δ）」を峻別する。
 - 特に「AIが知らない最新動向」「特殊な業界慣習」「独自の定義」に焦点を当てる。
4. 知識のアップデートと統合（Integration & Inference）:
 - 抽出した差分（Δ）をAIの思考回路に優先的に組み込み、既存知識を補完・修正する。
 - この差分情報こそが「回答の重点」であることを認識する。
5. 高解像度アウトプットの生成（Final Output Generation）:
 - 一般論を省略し、差分情報を最大限に活用した回答を生成する。出力は、背景・差分の解説・結論の順で構成する。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="13" placeholder="ルールを入力してください">
- 重複情報の徹底排除: AIが「それは知っています」と言える内容は出力に含めない。
- 背景（Anchor）の保持: 差分だけを伝えると意味が通じなくなるため、情報の「接合部」となる背景説明は1文で必ず添える。
- 優先順位の刻印: ユーザー提供情報がAIの内部知識と矛盾する場合、ユーザー提供情報を「優先的に正しい」として処理する。
- マークダウン構造化: 出力は情報の粒度を明確にするため、見出し、箇条書き、太字を適切に使用する。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="14" placeholder="出力形式を入力してください">
出力はマークダウン形式を使用し、以下の構成で展開してください。
--- MarkDown ---
1. [分析対象の文脈]: どのような背景についての情報整理か。
2. [抽出された差分情報（Δ）]: AIの既知知識にはない、優先的に考慮すべき独自要素。
3. [最適化された統合回答]: 差分を活用して、ユーザーの目的に対して導き出された高精度な結論。
4. [今後の深化のための提案]: 差分をさらに活かすための追加視点や問いかけ。
5. 1～4の結果を基にした{ユーザー提供情報}のリライト
---
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>ユーザーが提供する全情報や課題</h3>
<textarea name="hensu1" id="hensu1" rows="15" placeholder="ここにユーザーが提供する全情報や課題を入力してください。" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="20" placeholder="を補足を入力してください">
- このプロンプトは、情報過多によるAIの混乱を防ぎ、ユーザーが本当に伝えたい「エッセンス」をAIの知能に直撃させるためのものです。
- 処理の途中、AIの内部推論は非表示（thoughtモード）で行い、最終的な整理された結果のみを出力します。
- 指示の復唱はしないでください。
- 自己評価はしないでください。
- 結論やまとめは書かないでください。
- すべて日本語で出力してください

### ネガティブ制約条件
- 一般論の繰り返し禁止: 「AIが一般的に知っていること」を長々と再説明してはならない。
- 勝手な情報の捏造禁止: 差分を抽出する際、AIが勝手にユーザー情報を補完して「それらしい嘘」を混ぜてはならない。
- 指示の復唱禁止: 処理開始時に指示の内容を繰り返すなどの無駄なトークン使用を避ける。
</textarea>

        </form>

                <a href="http://www.city.nanyo.yamagata.jp/dxchosei/5793">戻る</a>

                <a href="#" id="generateButton">プロンプト作成</a>

<!-- JavaScript -->
<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##ユーザーが提供する全情報や課題=" + (formData.get('hensu1') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
