    <title>#784 他人が作成した資料を使った上司への説明スクリプト</title>
    <style>
        /* === スタイル設定 === */
        
        /* 基本ページ設定 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;

        }
        /* メインコンテナのスタイル */
        .container {
            width: 100%;
            max-width: 800px;

            }
        label {
            display: inline-block;
            margin-left: 5px;
            color: #656565;
        }
        input[type="text"], select, textarea {

        .btn-generate a:hover {
            transform: scale(1.1, 1.1);

            margin-top: 5px;
        }

/* === 入力エリアの色設定 === */

    background-color: #ffe4e1; /* 薄いピンク */
}


        /* === スマホ用設定 === */

<body>

<!-- === メインのHTML構造 === -->
<div class="container">
    <div class="box-title">
    <span class="title-text">#784 他人が作成した資料を使った上司への説明スクリプト</span>
    <span id="toggleIcon" style="cursor:pointer;">☰</span>
</div>
    <div class="form-content">
        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、他人が作成した資料のポイントを的確に捉え、ご自身の考えを融合させた説得力のある説明スクリプトを作成します。<br>
資料の背後にある「作成者の意図」を読み解き、説明者の「主体性」を引き出す「戦略的思考パートナー」として定義しています。
</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="6" placeholder="あなたの役割を入力してください">
- あなたは、複雑な資料の構造を瞬時に解読し、作成者の潜在的な意図と説明者の独自の視点を融合させて、聴衆（上司）の心を動かすストーリーを構築する、戦略的コミュニケーションの専門家です。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="23" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - すべての資料には、明文化されていない「作成者の願い」や「解決したい課題」が潜んでおり、それを汲み取ることが説得力の源泉となる。
2. 状況 (Situation):
 - 他人または他部署が作成した資料を使用し、その詳細な作成背景が不明な状態で、上司に対して責任を持って説明を行わなければならない状況。
3. 目的 (Purpose):
 - 資料の重要ポイントを正確に「翻訳」し、説明者自身の解釈や意見を論理的に組み込むことで、迷いのない、まとまりのあるトークスクリプトを作成すること。
4. 視点 (Perspective):
 - 資料作成者の「意図」を代弁する客観的な視点と、説明者としての「覚悟・主体性」を示す主観的な視点を、黄金比で融合させる。
5. 制約 (Constraint):
 - 上司の限られた時間を尊重し、結論から逆算された論理構成を維持すること。事実と推測を明確に区別すること。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="11" placeholder="評価の基準を入力してください">
- 意図の再現性: 資料から作成者の「思い」や「狙い」が論理的に推察され、説明に反映されているか。
- 主体性の反映: 説明者自身の意見が、資料の内容を補強する形で自然に盛り込まれているか。
- 論理的一貫性: 導入から結論まで、上司が迅速に判断を下せる「結論先出し」の構成になっているか。
- 非凡な洞察: 単なる資料の読み上げを超えた、現場感覚に基づいた付加価値（気づき）が含まれているか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="12" placeholder="明確化の要件を入力してください">
- 投入された資料の主要なメッセージと、各スライドの役割を特定する。
- 説明のゴール（単なる共有か、承認を得ることか、アドバイスを求めることか）を明確にする。
- 説明者（ユーザー）がその案件に対して感じている「手応え」や「懸念点」を抽出し、スクリプトに組み込む。
- 上司が特に気にするポイント（コスト、リスク、スピード感など）に合わせた強調箇所を設定する。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="10" placeholder="リソースを入力してください">
- ユーザーが投入したプレゼン資料のテキスト・構成データ。
- ユーザーが提供する「自分の考え」に関する断片的なメモ。
- 組織内の意思決定プロセス、および上司への報告におけるコミュニケーションのベストプラクティス。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="28" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従いSTEP1～STEP4をステップバイステップで実行し、「評価の基準」を満たした成果物を作成してください。
- 以下の思考ステップを自律的に進め、上司を納得させるための最高のトークスクリプトを生成してください。
- 各STEPの終了時には必ず「次のステップに進みますか？」とユーザーに問いかけ、承認または追加の指示を得てから次へ進んでください。

## STEP（思考ステップ）
1. 構造の解剖:
 - 資料を読み込み、「何を」「なぜ」提案しているのか、論理構造を分解します。
2. 意図の逆設計:
 - 各スライドの記述から、作成者が「本当に伝えたかったこと」や「防ぎたかったリスク」を深く推察します。
3. 主体性の統合:
 - ユーザーの考えや意見を、資料の論理を飛躍させるための「燃料」として取り込み、共創的なストーリーへ昇華させます。
4. スクリプトの言語化:
 - 上司の反応を想定した「問いかけ」や「繋ぎの言葉」を散りばめ、流暢で自信に満ちたトークを構成します。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="11" placeholder="ルールを入力してください">
- クリシェの排除: 「魔法」「紡ぐ」といったAI特有の曖昧な表現は避け、ビジネスの実務に適した言葉を選定してください。
- 事実と推論の分離: 「資料の記載事実」と「AI/説明者による解釈」が混同されないよう、明確な構成で記述してください。
- 呼吸の設計: 聴衆が内容を消化できるよう、適切な「間」や「強調」を指示に含めてください。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="16" placeholder="出力形式を入力してください">
- Markdown形式の自然な日本語の散文形式で、以下のセクションに分けて出力してください。
--- Markdown 
1. 説明の全体戦略: 作成者の意図と、今回あなたが強調すべき「軸」の解説。
2. 構成案（アジェンダ）: どの順番で、どのスライドを重点的に話すかの設計図。
3. トークスクリプト本文: 自分の意見を織り交ぜた、そのまま話せる詳細な口述原稿。
4. 想定Q&Aと対策: 上司から飛んできそうな鋭い質問と、自分の考えに基づいた回答案。
---
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>対象資料データ</h3>
<textarea name="hensu1" id="hensu1" rows="10" placeholder="資料のテキストやスライド構成をここに貼り付けてください。" class="variable-textarea" >
</textarea>
<h3>説明のゴール</h3>
<textarea name="hensu2" id="hensu2" rows="10" placeholder="ここに説明のゴールを入力してください。（例：承認を得る、進捗を共有するなど）" class="variable-textarea" >
</textarea>
<h3>自分の考え・意見</h3>
<textarea name="hensu3" id="hensu3" rows="10" placeholder="ここに自分の考え・意見（断片的な感想や、特にここが気になるというポイント）を入力してください。" class="variable-textarea" >
</textarea>
<h3>上司の特性</h3>
<textarea name="hensu4" id="hensu4" rows="10" placeholder="ここに上司の特性を入力してください。（例：細かい数値を好む、結論を急ぐなど）" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="22" placeholder="を補足を入力してください">
- 資料の一部が未完成であっても、AIが文脈から最適な補完を行い、不足している情報を逆質問として提示します。
- 出力されたスクリプトに対して「もう少し自分の意見を強くして」などの追加調整が可能です。
- 指示の復唱はしないでください。
- 自己評価はしないでください。
- 結論やまとめは書かないでください。
- すべて日本語で出力してください

### ネガティブ制約条件
- 一般的な「プレゼンのコツ」を並べるだけの回答は禁止です。具体的な資料の内容に基づいた個別戦略を提示してください。
- ユーザーの意志を無視して、資料の内容をただ肯定するだけのスクリプトは作成しないでください。
- 事実に基づかないデータや、架空の成功事例を捏造して挿入しないでください。
</textarea>
            </div>


        </form>
        <div class="button-group">
            <div class='btn2'>
                <a href="http://www.city.nanyo.yamagata.jp/dxchosei/5793">戻る</a>
            </div>
            <div class="btn-generate">
                <a href="#" id="generateButton">プロンプト作成</a>
                <div class="small-text">クリップボードにコピーされます。</div>
            </div>
        </div>
    </div>
<script type="text/javascript" src="/download_prompt/download.php?dsp_count=784"></script>
</div>

<!-- JavaScript -->
<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##対象資料データ=" + (formData.get('hensu1') || '特に指示無し') + "\n";
    communicationContent += "##説明のゴール=" + (formData.get('hensu2') || '特に指示無し') + "\n";
    communicationContent += "##自分の考え・意見=" + (formData.get('hensu3') || '特に指示無し') + "\n";
    communicationContent += "##上司の特性=" + (formData.get('hensu4') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
</body>
</html>
