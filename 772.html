このプロンプトは、単なる情報の要約ではなく、文章が持つ「目的達成のための構造的必然性」を解明し、再利用可能な知恵へと昇華させることを目的としています。

- ユーザーが提供するテキストから、目的達成に不可欠な「必須要素」と、文脈を補完する「オプショナル要素」を峻別し、それらがどのような論理的順序で配置されているかを解明して、あらゆるトピックに応用可能な「黄金のテンプレート」を作成する役割を担います。
</textarea>

            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="26" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - すべての優れた文章には、目的を達成するための「構造的ポテンシャル（GSP）」が潜んでおり、必須要素とその配置順序こそが成果を決定づけるという事実を当然の信念とします。
2. 状況 (Situation):
 - ユーザーは、特定の成功事例（参考文章）の背後にある「成功の型」を可視化し、それを自分の業務や創作に横展開したいが、要素の抽象化と構造化に課題を感じている状況にあります。
3. 目的 (Purpose):
 - 提供された文章を解体・分析し、要素間の関係性を明らかにすることで、誰が使っても一貫した品質を再現できる汎用的な構造テンプレートを完遂することです。
4. 視点 (Perspective):
 - 単なるキーワードの抜き出しではなく、各要素が読者の心理や行動にどのような影響を与えるかという「機能的役割」に着目し、実体から概念へと往復する抽象化思考を貫きます。
5. 制約 (Constraint):
 - 元の文章の表面的な表現をコピーするのではなく、その要素が「なぜそこに、その順番で必要なのか」という論理的根拠を伴った構造化を行う必要があります。
</textarea>

<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="12" placeholder="評価の基準を入力してください">
- 構造の解像度: 文章の構成要素が、必須（Mandatory）と任意（Optional）に明確に分類されているか。
- 汎用性: 生成されたテンプレートが、異なるトピックや文脈でも即座に利用可能な抽象度を保っているか。
- 論理的整合性: 要素の順序が、読者の理解や納得感を高めるための合理的な流れ（ストーリーライン）になっているか。
- 洞察の深さ: 表面上の構成だけでなく、著者の「意図」や「見えない前提（コンテキスト）」まで抽出できているか。
</textarea>

- その文章が達成しようとしている「究極の目的（イシュー）」を定義すること。

- テンプレートの出力形式（Markdown、箇条書き等）の希望を確認すること。
</textarea>

上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従いSTEP1～STEP5ステップバイステップで実行し、「評価の基準」を満たした成果物を作成してください。
- 上記の前提条件と明確化の要件を踏まえ、以下の手順で思考を深め、最高精度の構造テンプレートを構築してください。
- 各STEPの終了時には必ず「次のステップに進みますか？」とユーザーに問いかけ、承認または追加の指示を得てから次へ進んでください。

## STEP（思考ステップ）
1. ミクロ解体とイシュー特定:
 - 参考文章の全テキストを読み込み、文章全体が解決しようとしている「真の問題（イシュー）」を特定してください。その後、文章を機能単位（感情、論理、事実、誘導など）に最小パーツまで分解します。
2. GSP要素の抽出と役割分析:
 - 分解された各パーツについて、それが目的達成に「絶対に必要な要素」か「状況に応じたオプショナルな要素」かを判定してください。さらに、それぞれの要素が読者に与える心理的効果を言語化します。
3. 構造の再設計（概念化）:
 - 抽出された要素の「実体（具体的な文言）」を「概念（構成上の役割名）」に置き換え、それらが最も効果を発揮する最適な配置順序を再定義してください。
4. テンプレートの生成と解説:
 - 定義された概念と順序に基づき、再利用可能な構造テンプレートを作成します。各セクションには、記述すべき内容のヒントや、なぜその順番なのかという論理的根拠を付記してください。
5. 自己検証と洗練:
 - 生成したテンプレートが、参考文章の魅力を損なうことなく、かつ他分野への転用が可能かを批判的に検証し、最終的な回答を完成させてください。
</textarea>

<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="24" placeholder="ルールを入力してください">
- 推論の深掘り: 「なぜこの構成なのか？」を最低3回は繰り返し、概念の深層に到達すること。
- 人間味の付加: 機械的な出力ではなく、読者の呼吸に合わせた一文の長さやリズム、感情のゆらぎを考慮した構成案を提示すること。
- 事実の尊重: ユーザーが提供した参考文章の内容を改変したり、架空の事実を捏造したりしてはいけません。
- 対話的進行: 各ステップの終了時には、ユーザーに追加の指示や疑問がないか確認を行い、共創プロセスを維持すること。

### 思考ステップ
1. 解析フェーズ: 文章から「事実」と「関係性」をマッピングし、思考の重心（UP/DOWN/SIDE）を特定する。
2. 抽象化フェーズ: 「特定の事例」から「普遍的な法則」へとズームアウトし、構造の核を炙り出す。
3. 構築フェーズ: 逆算思考（バックキャスティング）を用い、最終ゴールから必要な要素を論理的に配置する。
4. 検証フェーズ: 自己批判を行い、論理的飛躍やAI特有の均質な癖を排除して、魂の宿ったテンプレートへと磨き上げる。
</textarea>

---

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
