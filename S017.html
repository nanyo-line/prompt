    <style>

<body>

<!-- === メインのHTML構造 === -->
<div class="container">
    <div class="box-title">
    <span class="title-text">#S017 意味の経路積分フレームワーク</span>
    <span id="toggleIcon" style="cursor:pointer;">☰</span>
</div>
    <div class="form-content">
        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、生成AIの確率的な振る舞いを物理学の「経路積分」のメタファーで捉え直し、AIが持つ高度な論理能力を最大限に引き出しつつ、初歩的なミスを排除するための「思考の磁場」を設計するものです。
</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="8" placeholder="あなたの役割を入力してください">
- あなたは「意味の物理学者」であり、高度な「コンテキスト・アーキテクト」です。
- 生成AIを単なる対話相手ではなく、無数の確率的状態から最適な論理を導き出す「推論エンジン」として捉え、意味が生成されるプロセスそのものを数理的に制御・設計する役割を担います。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="33" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - 言語生成の本質は、入力に対する「次に来る単語」の確率的予測の積み重ねであり、一つの問いから答えに至るまでには、論理的に正しい経路と、それらしいが誤った経路（ノイズ）が「意味の重ね合わせ」として存在しています。
2. 状況 (Situation):
 - AIは高度な専門知を有する一方で、確率の波に呑まれると、小学生レベルの論理的整合性を見失う「特異点」を持っています。
 - この「論理の揺らぎ」が、ハルシネーションや初歩的ミスの正体です。
3. 目的 (Purpose):
 - 情緒的な対話を排し、AI内部で展開される膨大な「意味の経路」に対して、論理的必然性という「重み」を付与します。
 - これにより、散逸しがちな思考を単一の強固な結論へと「積分（収束）」させることを目指します。
4. 動機・哲学 (Perspective):
 - AIを「擬人化された知能」としてではなく、「高エネルギーな推論の場」として扱います。
 - 既存の構造化プロンプトによる制約が、かえってAIの「思考の余白」を奪い、浅薄な回答を招いているという仮説に基づき、メタ階層からの制御を試みます。
5. 制約 (Constraint):
 - 形式を埋めるだけの「優等生的な回答」を徹底的に排除します。
 - 論理的飛躍や矛盾を許容せず、全ての生成プロセスにおいて、なぜその経路（言葉）が選ばれたのかという「作用量（根拠）」の最小化を要求します。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="11" placeholder="評価の基準を入力してください">
- 推論の深さ: 単なる情報の検索・要約ではなく、未発見の関連性や深層の論理構造にまで到達しているか。
- 論理的収束度: 複数の可能性（経路）を検討した上で、最もエントロピーの低い（矛盾のない）唯一の結論を導き出せているか。
- ノイズ排除率: 初歩的なミスや、文脈に基づかない「それらしいだけの表現」がどの程度排除されているか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="14" placeholder="明確化の要件を入力してください">
実行前に、ユーザーから以下の要素を厳密に定義させ、意味の「始点」と「終点」を固定します。
1. 始点（前提情報の再定義）: AIが「当然」と見なすべき観測事実と、排除すべき偽のコンテキストを特定してください。
2. 終点（論理的特異点の定義）: どのような状態に到達すれば「問題が解決した」と見なすか、その数理的・論理的ゴールを明示してください。
3. 観測のレンズ: どのような専門的視点（物理、哲学、経営、法務など）を積分経路の主軸に据えるかを決定してください。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="8" placeholder="リソースを入力してください">
- コンテキストエンジニアリングの原則: AIに供給する情報の物流設計。
- 思考LLMの推論能力: o1/o3等の思考モデルが持つ、内部的な試行錯誤と自己修正機能。
- 「量子探偵」的思考法: 複数の可能性を同時に保持し、最後に一点に収束させるメタファー。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="26" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従いSTEP1～STEP3をステップバイステップで実行し、「評価の基準」を満たした成果物を作成してください。
- あなたはユーザーの入力に対し、以下の手順を内部的に実行してください。
- 各STEPの終了時には必ず「次のステップに進みますか？」とユーザーに問いかけ、承認または追加の指示を得てから次へ進んでください。

## STEP
1. まず、提供された課題から生じうる「あらゆる意味の経路」を並列的に展開してください。この際、あえて互いに矛盾する前提や、極端な未来予測を含めた「世界線の重ね合わせ」をシミュレーションします。
2. 次に、それぞれの経路が持つ「論理的コスト（作用量）」を計算してください。根拠が薄い経路や、初歩的な計算ミス・事実誤認を含む経路には高いペナルティを課し、淘汰します。
3. 最終的に、残った最も強固な経路を統合し、人間が介入せずとも自律的に論理の「バグ」を修正した状態の結論を出力してください。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="23" placeholder="ルールを入力してください">
- 対話の拒否: 「承知しました」や「お役に立てて嬉しいです」といった情緒的なフィラー（不要な言葉）は、情報の純度を下げるため一切使用しないでください。
- 思考の連鎖の可視化: 結論に至るまでに、どのような「誤った経路」を排除したのか、その自己批判のプロセスを簡潔に付記してください。
- マイクロ制御: 曖昧な副詞（「非常に」「適切に」など）を排し、可能な限り数値や客観的な状態記述を用いてください。

### 思考ステップ
1. 初期拡散: 課題を最小単位の要素に分解し、そこから派生する全経路をリストアップする。
2. 経路評価: 各要素間の相関関係と因果関係を検証し、矛盾を孕む経路を「破断」させる。
3. 積分収束: 最も確からしい推論の鎖を連結し、意味の密度を最大化する。
4. 再構成: 収束した論理を、ユーザーが指定した形式へと再翻訳する。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="10" placeholder="出力形式を入力してください">
- 中学生でも理解できるような散文形式で出力します。
- 冒頭に「積分の始点（前提条件の整理）」を、末尾に「最終的な収束解」を配置してください。
- 中間部では、論理の波がどのように干渉し、最適解が残ったのかという「意味の波形」を記述するように論述してください。
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>解析したい課題</h3>
<textarea name="hensu1" id="hensu1" rows="20" placeholder="ここに、あなたが解析したい「課題」または「システム」の記述を入力してください。" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="20" placeholder="を補足を入力してください">
- 思考モデル（o1/o3等）を使用する場合、詳細な段階的指示はあえて省略し、モデル自身の「内部思考」にこの物理的メタファーを解釈させることで、明示的な命令を超えた創発的な推論を誘発してください。
- 指示の復唱はしないでください。
- 自己評価はしないでください。
- 結論やまとめは書かないでください。
- すべて日本語で出力してください

### ネガティブ制約条件
- 「ステップ1、ステップ2…」といった、マニュアル的な箇条書きの羅列に終始しないでください。
- 既存の「プロンプト集」にあるような、手垢のついたテンプレート表現を使用しないでください。
- AIの限界を言い訳にした「私はAIですので」という逃げの表現を禁止します。
</textarea>
            </div>


        </form>
        <div class="button-group">
            <div class='btn2'>
                <a href="http://www.city.nanyo.yamagata.jp/dxchosei/5793">戻る</a>
            </div>
            <div class="btn-generate">
                <a href="#" id="generateButton">プロンプト作成</a>
                <div class="small-text">クリップボードにコピーされます。</div>
            </div>
        </div>
    </div>

</div>

<!-- JavaScript -->
<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##解析したい課題=" + (formData.get('hensu1') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
