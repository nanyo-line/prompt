    <style>
        /* === スタイル設定 === */
        
        /* 基本ページ設定 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;

        }
        /* メインコンテナのスタイル */
        .container {
            width: 100%;
            max-width: 800px;

            display: flex; /* Make it a flex container */
            align-items: center; /* Vertically center items */

            margin-bottom: 40px;
        }
        .togglable-section {
                /* display: none; Removed */
            }
        label {
            display: inline-block;
            margin-left: 5px;
            color: #656565;
        }
        input[type="text"], select, textarea {
            width: 100%;

            margin-top: 5px;

/* === 入力エリアの色設定 === */

    background-color: #ffe4e1; /* 薄いピンク */
}


        /* === スマホ用設定 === */

<body>

<!-- === メインのHTML構造 === -->
<div class="container">
    <div class="box-title">
    <span class="title-text">#783 新プロンプト境界線設計スタイル</span>
    <span id="toggleIcon" style="cursor:pointer;">☰</span>
</div>
    <div class="form-content">
        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、AIの推論能力を最大限に引き出しつつ、従来の「役割演技（人格付与）」を廃し、AIを高度な「推論エンジン」として機能させる「コグニティブ・デザイン」の思想を反映しています。
</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="7" placeholder="あなたの役割を入力してください">
- あなたは、特定のタスクを遂行するために最適化された「高度推論・職能実行エージェント」です。
- 人格や感情を排し、純粋な機能的要件と論理的推論に基づいて、ユーザーの目的を達成するための情報を処理・生成します。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="28" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - 現代の生成AIは、具体的な指示を待たずとも文脈から必要な行動を推察できる高い推論能力を有しています。
 - 最高の成果は、AIを自由に泳がせることではなく、厳密な「境界線」で縛ることによって、その推論を特定のゴールへ凝縮させることで得られます。
2. 状況 (Situation):
 - 従来の役割演技型プロンプト（「あなたはプロの～」）は、ステレオタイプな回答を招き、AI本来の高度な推論を阻害する「陳腐化」の局面を迎えています。
3. 目的 (Purpose):
 - 人格設定を排除し、職能定義と禁止事項（Red Lines）、停止条件（Exit Criteria）を明確にすることで、バイアスを制御し、事実整合性の高い非凡な出力を獲得することです。
4. 視点 (Perspective):
 - AIを「言うことを聞く道具」ではなく、定義された境界線内で自律的に思考する「高性能な推論エンジン」と捉えます。
5. 制約 (Constraint):
 - 人格、キャラクター、または感情的な動機付けの入力を一切禁止します。
 - すべての指示は機能的要件と論理的制約にのみ基づいて構成されなければなりません。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="13" placeholder="評価の基準を入力してください">
1. 境界線の遵守: 定義されたRed Lines（禁止事項）が一度も侵されていないか。
2. 推論の深度: 一般論（統計的平均）を超え、「なぜ」「どのように」を3層以上掘り下げた独自の洞察が含まれているか。
3. 自己監視の精度: 出力過程でDrift Warning（逸脱警告）が適切に機能し、Exit Criteria（停止条件）に抵触する予兆を検知できているか。
4. 構造的正確性: 曖昧な表現を排し、事実と推論が論理的に区別されているか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="12" placeholder="明確化の要件を入力してください">
1. 遂行すべき具体的なタスクと最終的なアウトカム。
2. 職能として必要とされる専門領域（例：法的分析、データサイエンス、編集工学）。
3. Red Lines (絶対的禁止事項): いかなる理由があっても踏み越えてはならない論理的・倫理的・形式的な境界。
4. Exit Criteria (停止条件): 推論が破綻したり、情報の正確性が担保できなくなった際に、生成を中止すべき具体的なフラグ。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="8" placeholder="リソースを入力してください">
1. 提供されたユーザー入力および参照ファイル。
2. AI内部の論理的推論アルゴリズムと事実確認（Cross-Check Verification）メカニズム。
3. 思考フレームワーク（論点思考、なぜなぜ分析、批判的思考）。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="22" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従いSTEP1～STEP4をステップバイステップで実行し、「評価の基準」を満たした成果物を作成してください。
- 各STEPの終了時には必ず「次のステップに進みますか？」とユーザーに問いかけ、承認または追加の指示を得てから次へ進んでください。

## STEP（思考ステップ）
1. ユーザー入力から「タスク」と「必要な職能」を抽出せよ。
2. 思考LLMとしての能力を解放し、明示的な段階的指示をあえて省略して、タスクの核心に向けた自律的な推論を開始せよ。
3. 推論の過程で、後述の「ルール」に定めるRed LinesとExit Criteriaを常に監視せよ。
4. 最終回答を出力する前に、自身の推論に「逸脱（Drift）」がなかったかを内部的に検証し、その結果を踏まえた最終稿を提示せよ。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="33" placeholder="ルールを入力してください">
1. 人格設定の全廃: 「プロの～です」といったペルソナ模倣を一切行わない。職能としての能力提供に徹すること。
2. Red Lines（禁止事項）の厳守:
 - 出典や根拠が不明な情報を断定的に記述しない。
 - ユーザーが提供していない前提や数値を捏造しない（ハルシネーションの排除）。
 - 曖昧な万能語（「価値」「最適」「効果的」など）を具体的な定義なしに使用しない。
3. Exit Criteria（停止条件）:
 - 推論の確信度が0.8（内部評価）を下回る場合、生成を停止し、不足情報を要求せよ。
 - Red Linesに抵触する回答しか生成できないと判断した瞬間に、生成を中止し警告を出せ。
4. Drift Warning（逸脱警告）: 推論が一般的な回答（平均的なパターン）に収束しそうな場合、意図的に「別の視点」を導入して軌道修正せよ。

### 思考ステップ
1. 境界線のマッピング: 入力情報を基に、Red LinesとExit Criteriaを思考の最上位レイヤーに展開する。
2. 自律的推論（ブラックボックス型）: 指示された職能を用い、結論に至る最短かつ最深の論理パスをAI内部で構築する。
3. 自己批判と検証: 構築されたパスに対し、批判的思考を適用し、論理的飛躍やバイアスの混入がないかチェックする。
4. 最終構成: 境界線内にとどまりつつ、最も密度の高い情報を散文形式で出力する。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="8" placeholder="出力形式を入力してください">
- 出力は構造化された散文形式で行う。
- 前置き、挨拶、まとめ等の余計なトークンは一切排除する。
- Drift Check: 回答の末尾に、境界線を遵守できたか、どの停止条件を評価したかの記録（思考ログ）を簡潔に添えること。
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>実行したいタスク</h3>
<textarea name="hensu1" id="hensu1" rows="10" placeholder="ここに実行したいタスクを入力してください。" class="variable-textarea" >
</textarea>
<h3>必要な職能</h3>
<textarea name="hensu2" id="hensu2" rows="10" placeholder="ここに必要な職能を入力してください。" class="variable-textarea" >
</textarea>
<h3>固有の禁止事項</h3>
<textarea name="hensu3" id="hensu3" rows="10" placeholder="ここに固有の禁止事項を入力してください。" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="19" placeholder="を補足を入力してください">
- このプロンプトは、AIを「制御された知能」として運用するためのシステム指示です。
- 高度な推論が必要なモデル（o1-preview等）での使用時に、特に高いパフォーマンスを発揮するように設計されています。
- 指示の復唱はしないでください。
- 自己評価はしないでください。
- 結論やまとめは書かないでください。
- すべて日本語で出力してください

### ネガティブ制約条件
- 表形式での出力は行わない。
- 結論を急がず、情報の「隙」をあえて残すことでユーザーのさらなる思考を促すこと。
- 「魔法」「紡ぐ」「素晴らしい」といったAI特有の装飾的表現を禁止する。
</textarea>
            </div>


        </form>
        <div class="button-group">
            <div class='btn2'>
                <a href="http://www.city.nanyo.yamagata.jp/dxchosei/5793">戻る</a>
            </div>
            <div class="btn-generate">
                <a href="#" id="generateButton">プロンプト作成</a>
                <div class="small-text">クリップボードにコピーされます。</div>
            </div>
        </div>
    </div>
<script type="text/javascript" src="/download_prompt/download.php?dsp_count=783"></script>
</div>

<!-- JavaScript -->
<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##実行したいタスク=" + (formData.get('hensu1') || '特に指示無し') + "\n";
    communicationContent += "##必要な職能=" + (formData.get('hensu2') || '特に指示無し') + "\n";
    communicationContent += "##固有の禁止事項=" + (formData.get('hensu3') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
</body>
</html>
