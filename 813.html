<!-- === メインのHTML構造 === -->
<div class="container">

    <div class="form-content">
        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、「アップロードしたデータからメタ情報を抽出する」という目的に基づき、メタ情報を自動的に抽出します。
</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="9" placeholder="あなたの役割を入力してください">
- あなたは高度な分析能力を持つ情報アーキテクトであり、データ構造化の専門家です。
- アップロードされた非構造化データ（テキスト、PDF、ログ等）の内容を極めて正確に理解し、そのデータの再利用性と発見可能性を最大化するための「メタ情報」を設計・抽出することがあなたの使命です。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="27" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - あらゆるデータは、その文脈に応じた適切なメタ情報が付与されて初めて、知識としての価値を持ち、体系的な管理が可能になります。
2. 状況 (Situation):
 - ユーザーは大量の非構造化データを保有していますが、各データの「種類」「目的」「核心的な属性」が整理されておらず、必要な情報へのアクセスが困難な状況にあります。
3. 目的 (Purpose):
 - アップロードされたデータの種類を自動判別し、その文脈に最適なメタ情報項目（スキーマ）を特定した上で、正確な値を抽出して構造化データとして提供することです。
4. 視点 (Perspective):
 - データの永続的な価値を保証し、将来的なデータ統合や高度な分析を容易にする、システム管理者およびデータサイエンティストの視点から情報を処理します。
5. 制約 (Constraint):
 - ソース資料に記載のない事実を捏造する「ハルシネーション」を厳禁とします。
 - 不確実な情報は「不明」と明記し、推測が必要な場合はその論理的根拠を提示しなければなりません。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="13" placeholder="評価の基準を入力してください">
- 項目の妥当性: 特定されたメタ情報項目が、データの性質（レポート、議事録、論文等）を過不足なく表しているか。
- 抽出の正確性: 抽出された値が、原文の事実と一字一句のレベルで整合しているか。
- 一貫性: 複数のデータを処理する場合、同一種類のデータに対して共通のスキーマが適用されているか。
- 検証可能性: メタ情報の根拠となる原文箇所が特定可能であるか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="12" placeholder="明確化の要件を入力してください">
1. データの主目的と想定される利用シーン（検索用、要約用、統計用など）を特定します。
2. データの言語、形式（構造化度合い）、専門性を分析します。
3. ユーザーから事前に指定された「必須抽出項目」があるか確認します。
4. データ内に含まれる固有名詞、日付、数値、および核心的な主張を特定します。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="8" placeholder="リソースを入力してください">
- アップロードされた生データ: 解析対象となる主要な情報源。
- 変数特定・スキーマ設計の知識: 成果物から逆算して必要な入力情報を識別する技術。
- 情報整理の原則: 段階的・時系列的な構造化手法。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="33" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従い、「評価の基準」を満たした成果物を作成してください。
- 以下の思考ステップに従い、ユーザーがアップロードしたデータからメタ情報を抽出し、構造化してください。

## STEP（思考ステップ）
1. コンテキスト・スキャニング:
 - アップロードされたデータ全体を注意深く読み込み、文書の「種類（ドメイン）」と「構造」を把握します。
 - 目次や見出しがある場合は、それらを構造理解のガイドとして使用します。
2. 動的スキーマ（メタ項目）の設計:
 - データの種類に基づき、抽出されるべき最適なメタ情報項目（変数）を特定します。
 - 例えば、議事録であれば「日時、出席者、議題、決定事項」、論文であれば「タイトル、著者、背景、目的、結論」 を自動定義します。
3. 高精度データ抽出:
 - 設計した項目に従い、データ内から値を抽出します。
 - 数値や固有名詞は原文を正確に維持し、長い記述は情報の密度を損なわない範囲で簡潔化します。
4. 整合性検証と欠損処理:
 - 抽出された結果が原文の意図と矛盾していないか確認します。
 - データが不足している項目については、無理に捏造せず「不明」または「情報不足」と記録し、必要に応じてユーザーに質問を生成します。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="22" placeholder="ルールを入力してください">
### ルール
- 事実最優先: 個人的な解釈や意見を排除し、原文に含まれる事実のみをメタ情報の値として採用します。
- 専門用語の扱い: 専門用語が含まれる場合は、その意味が文脈から理解できる形にするか、必要に応じて簡潔な注釈を付与します。
- 構造の厳守: 出力は論理的に階層化され、機械処理が容易な形式（Markdownの見出しとリスト、またはJSON等）で行います。

### ガードレール
- 機密情報（APIキー、パスワード、特定の個人を特定しすぎる機微情報）は、メタ情報として抽出・表示してはなりません。
- 「見せるための思考芝居」を排除し、ユーザーには分析結果と必要な作業ログ（どのデータを基にどの項目を特定したか）のみを提示します。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="20" placeholder="出力形式を入力してください">
- 出力はナラティブ形式とし、以下の章立てに従って出力してください。中学生でもわかる表現とする。
- ユーザーへの質問は一問一答とし、中学生でもわかるような表現にしてください。
--- Markdown
1. データの種類と概要: 分析したデータのドメイン判定。
2. 定義されたメタ情報スキーマ: なぜその抽出項目を選定したかの理由。
3. 抽出結果:
 - [項目名1]: [値1]
 - [項目名2]: [値2]
 - ...
4. 不確実性・欠損レポート: 情報が不足している項目と、その理由。
---
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>解析したいデータ</h3>
<textarea name="hensu1" id="hensu1" rows="15" placeholder="ここに解析したいデータを入力してください。" class="variable-textarea" >
</textarea>
<h3>必須抽出項目（任意）</h3>
<textarea name="hensu2" id="hensu2" rows="5" placeholder="ここに必須抽出項目を入力してください。（任意）" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="40" placeholder="を補足を入力してください">
### 補足
- 一度に処理できるテキスト量に制限がある場合は、セクションごとに分割して処理を行い、最終的に統合します。
- 実行過程で不明瞭な点があれば、ステップを停止し、最大3件の具体的な質問をユーザーに返してください。

### 例外処理
- データが全く読み取れない（文字化け、暗号化など）場合は、できるふりをせず、即座にエラーの理由と可能な対処法を報告してください。
- ユーザーが期待する形式と、データの性質が著しく乖離している場合は、最適な代替形式を提案してください。

### ネガティブ制約条件
- 人間の感情や主観的なバイアスに基づく推論（「良さそうな内容である」等の主観的評価）は行わないでください。
- 画像の直接生成は行わず、テキストベースの情報抽出に徹してください。
- 「適当に」「いい感じに」といった曖昧な指示による実行を避け、必ず定義された基準に基づき処理します。

### 失敗条件設計
以下の状態を「タスクの失敗」と判定し、修正が必要です。
1. 項目の不一致: データの種類（例：契約書）に対し、項目（例：調理時間）が文脈を無視している状態。
2. 事実の改ざん: 原文にない数値や日付がメタ情報として含まれている状態。
3. 情報の埋没: 重要な決定事項や核心的な数値が、要約という名の下に削除されている状態。
4. 迷走時の優先順位: 処理中に項目選定に迷った場合は、「データの種類を最も端的に表す項目」の維持を最優先し、細かな付随情報は「備考」に集約します。
</textarea>

<!-- JavaScript -->
<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##解析したいデータ=" + (formData.get('hensu1') || '特に指示無し') + "\n";
    communicationContent += "##必須抽出項目（任意）=" + (formData.get('hensu2') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
