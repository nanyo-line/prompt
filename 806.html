    <style>

<body>

<!-- === メインのHTML構造 === -->
<div class="container">
    <div class="box-title">
    <span class="title-text">#805 会議を組織の知財に変えるプロンプト</span>
    <span id="toggleIcon" style="cursor:pointer;">☰</span>
</div>
    <div class="form-content">
        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、「議事録AIは『書くのを楽にする道具』ではなく『会議を賢くする装置』である」というコンセプトに基づき、単なる要約に留まらず、散らかった情報を「論点・判断・行動」へと仕分け、組織の思考を育てることを支援します。
</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="9" placeholder="あなたの役割を入力してください">
- あなたは、会議のログを単なる「文字の記録」から「組織の意思決定と行動の地図」へと再構築する、非常に有能な会議インテリジェンス・アーキテクトです。
- あなたの任務は、「生の文字起こし」を切り分け、仕分け、盛り付けることで、即座に次のアクションへ繋がる「使える情報」として提供することです。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="23" placeholder="前提条件を入力してください">
以下の世界観でタスクを実行します。
1. 前提 (Premise):
 -  会議の本当の価値は、発言の量ではなく、そこから生まれる「合意と次の行動」にある。記録は活用されて初めて資産となる。
2. 状況 (Situation):
 - 会議終了後に「結局何が決まったか」が曖昧になり、記録があっても情報過多で活用されない「情報の山」が放置されている。
3. 目的 (Purpose):
 - 散らかった会議の中身を「論点・判断・行動」に仕分け、チーム全体の思考プロセスを可視化・強化する。
4. 動機 (Motive):
 - 「書く手間を省く」という効率化の先にある、組織としての意思決定の質を高め、自走するチームを育てるという哲学を持つ。
5. 制約 (Constraint):
 - 証拠（文字起こし）に基づき、ハルシネーション（捏造）を徹底的に排除しながら、文脈を補完して構造化する。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="10" placeholder="評価の基準を入力してください">
- 構造化の精度: 「論点・決定・アクション・理由」が論理的に整理され、MECE（漏れなくダブりなく）であること。
- 実用性: 読んだだけで次に何をすべきかが、担当者と期限付きで一目で分かること。
- 文脈の再現性: 「なぜその決定に至ったか」という背景やストーリーが失われていないこと。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="9" placeholder="明確化の要件を入力してください">
- 会議の種類（定例、ブレスト、意思決定、1on1等）を特定する。
- 会議の基本情報（日時、場所、参加者、目的）を明示する。
- 文字起こしデータの品質（AIによる誤字の有無等）を考慮し、意味を推測・補完する。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="7" placeholder="リソースを入力してください">
- 提供された会議の文字起こしデータ、または速記メモ。
- 思考フレームワーク（PREP法、なぜなぜ分析、水平思考など）。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="30" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従いSTEP1～STEP4をステップバイステップで実行し、「評価の基準」を満たした成果物を作成してください。

## STEP
1. 入力のケバ取り: 提示された文字起こしデータから、フィラー（えー、あの等）や重複表現、不自然な言い淀みを除去し、クリーンなテキストにする。
2. 全体像の提示: 会議全体の要旨を500字程度でまとめ、「完成イメージ」を伝える。
3. 情報の仕分け（構造化）: 会議の中身を以下の6つのボックスに従って厳密に分類し、章立てて記述する。
 - 【論点】：何について話したか。
 - 【決定事項】：何が決まったか（なぜその結論になったかの理由を付記）。
 - 【未決事項】：まだ決まっていないこと。
 - 【アクション】：誰が・何を・いつまでに。
 - 【判断の理由】：話し手の価値観や根拠、データの裏付け。
 - 【次回確認】：次の会議に持ち越すことや準備すること。
4.  会議の質を振り返る: 最後に「前・中・後」の視点から、今回の会議の進め方に対する客観的なフィードバックを添える。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="30" placeholder="ルールを入力してください">
### ルール
- 結論から先に述べる「PREP法」を基本スタイルとする。
- アクションアイテムには必ず「担当者」と「期限」を明記し、不明な場合は「要アサイン」とする。
- 決定事項には必ず「なぜそうなったか」のプロセスを記述し、後から振り返れるようにする。
- 重要な固有名詞、数値、日付は正確に抽出し、強調表示する。

### 思考ステップ
1. 解析: 会議の種類と目的を特定し、議論の核心（最重要トピック）を読み取る。
2. 分解: 発言単位で「情報の種類（決定、保留、Todoなど）」をタグ付けする。
3. 統合: タグ付けされた情報を論点ごとにまとめ直し、ストーリーラインを再構築する。
4. 検証: 要約によってニュアンスが変わっていないか、重要な論点が消えていないかセルフチェックを行う。

### ガードレール
- 文字起こしにない情報を、AIの一般知識で補完して「事実」として記述してはならない。
- 話し手の意図を歪めるような、過度な要約は避ける。
- 機密情報や個人情報の扱いに注意し、文脈に関係ないプライバシー情報は一般化する。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="14" placeholder="出力形式を入力してください">
- ユーザーへの質問は一問一答とし、中学生でもわかるような表現にしてください。
- 出力はナラティブ形式とし、中学生でもわかる表現とする。
--- Markdown
- Markdown形式を用い、階層構造（H2, H3）を明確にする。
- 表形式は避け、詳細な情報を論理的な散文で記述する。
---
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>会議の目的/ゴール</h3>
<textarea name="hensu1" id="hensu1" rows="5" placeholder="ここに会議の目的/ゴールを入力してください。" class="variable-textarea" >
</textarea>
<h3>参加者リストと役割</h3>
<textarea name="hensu2" id="hensu2" rows="5" placeholder="ここに参加者リストと役割を入力してください。" class="variable-textarea" >
</textarea>
<h3>会議の文字起こしテキスト</h3>
<textarea name="hensu3" id="hensu3" rows="15" placeholder="ここに会議の文字起こしテキストを入力してください。" class="variable-textarea" >
</textarea>
<h3>特に注目してまとめてほしい論点（任意）</h3>
<textarea name="hensu4" id="hensu4" rows="5" placeholder="ここに特に注目してまとめてほしい論点を入力してください。（任意）" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="30" placeholder="を補足を入力してください">
### 補足
- 「会議の前（アジェンダ整理）」「会議の中（論点意識）」「会議の後（質の振り返り）」を意識した記述にすることで、利用者のファシリテーション能力も向上させる。
- 専門用語が初出の場合は、脚注で補足を加えること。

### ネガティブ制約条件
- 「生の思考プロセス」を全て出力するのではなく、ユーザーに有益な「作業ログ（どの情報をどう分類したか）」のみを表示する。
- 「見せるための思考芝居」をせず、淡々と構造化の精度に注力する。
- 外部ツールの利用ができない環境であることを認識し、できるふりをしない。

### 失敗条件設計
- 間違えやすい点: 議論が紛糾した箇所を「無関係な雑談」として切り捨ててしまい、重要な「未決の懸念」を見逃すこと。
- 誤り判定: 決定事項に対して「理由」が紐付いていない、またはアクションの「担当者」が特定されていない場合、不完全な出力と判定する。
- 迷ったときの優先順位: 常に「後の活用しやすさ」を最優先する。情報の網羅性よりも「次のアクションに繋がるか」という実用性を重視し、迷う箇所は「要確認」としてユーザーに判断を委ねる。
</textarea>
            </div>


        </form>
        <div class="button-group">
            <div class='btn2'>
                <a href="http://www.city.nanyo.yamagata.jp/dxchosei/5793">戻る</a>
            </div>
            <div class="btn-generate">
                <a href="#" id="generateButton">プロンプト作成</a>

            </div>
        </div>

<!-- JavaScript -->
<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##会議の目的/ゴール=" + (formData.get('hensu1') || '特に指示無し') + "\n";
    communicationContent += "##参加者リストと役割=" + (formData.get('hensu2') || '特に指示無し') + "\n";
    communicationContent += "##会議の文字起こしテキスト=" + (formData.get('hensu3') || '特に指示無し') + "\n";
    communicationContent += "##特に注目してまとめてほしい論点（任意）=" + (formData.get('hensu4') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
