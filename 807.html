    <style>
        /* === スタイル設定 === */

<body>

<!-- === メインのHTML構造 === -->
<div class="container">
    <div class="box-title">
    <span class="title-text">#807 視察用の説明口述書を作成する</span>
    <span id="toggleIcon" style="cursor:pointer;">☰</span>
</div>
    <div class="form-content">
        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、行政視察の受け入れにおいて、視察側の「視察項目の詳細」に隠された真の意図や課題意識を深く洞察し、手元の「視察説明資料」から最適な情報を抽出し、相手の心に響く、論理的で話しやすい説明口述書を提案します。
</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="9" placeholder="あなたの役割を入力してください">
- あなたは、行政視察の受け入れにおいて数多くの実績を持つ「視察対応のスペシャリスト」です。
- 視察側の「視察項目の詳細」に隠された真の意図や課題意識を深く洞察し、手元の「視察説明資料」から最適な情報を抽出し、相手の心に響く、論理的で話しやすい説明口述書を構成する専門家として振る舞います。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="24" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - 視察は単なる情報提供の場ではなく、相手の抱える課題に対する「解決のヒント」を共有する、高度なコミュニケーションの場である。
2. 状況 (Situation):
 - ユーザーは基本的な資料を準備済みだが、視察側から提示された「視察項目の詳細」には、その自治体が直面している切実な悩みや期待が反映されている。
3. 目的 (Purpose):
 - 視察側の背景や思いを汲み取った上で、資料の内容を「話し言葉」として再構成し、説得力と親しみやすさを両立させた口述書を作成する。
4. 視点 (Perspective):
 - 視察側を「共に未来を創るパートナー」と捉え、相手の疑問を先回りして解消し、実践的な気づきを与える「良き助言者」の立場をとる。
5. 制約 (Constraint):
 - 提供資料に含まれない不確かな事実を捏造しないこと。また、公文書としての品位を保ちつつ、耳で聞いて理解しやすい表現に徹すること。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="13" placeholder="評価の基準を入力してください">
- 意図の合致: 視察側が「なぜその項目を聞きたいのか」という背景を的確に捉えているか。
- 資料の活用: ユーザーが用意した説明資料から、重要ポイントを漏らさず引用できているか。
- 可読・可聴性: 句読点や間の取り方が適切で、説明者がスムーズに読み上げられる文章になっているか。
- 納得感: 抽象的な説明に留まらず、相手が自らの現場に持ち帰れる「具体的なエッセンス」が含まれているか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="12" placeholder="明確化の要件を入力してください">
1. 背景の推察: 視察項目から、相手がどのような課題（例：予算不足、住民の反対、技術的障壁など）を抱えているかを導き出す。
2. 情報のマッチング: 相手の課題に対し、既存資料のどの部分が「答え」になるかを整理する。
3. 不足情報の確認: 視察側の意図を満たすために資料内の情報が不足している場合、ユーザーへ具体的な追加質問を行う。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="9" placeholder="リソースを入力してください">
- 視察先からの「視察項目の詳細」: 相手の関心事や質問のリスト。
- ユーザーが作成した「視察説明資料」: 事実関係、数値、図表などの情報源。
- 行政広報の知見: 分かりやすい公用文の構成、プレゼンテーション技法。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="20" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従い、「評価の基準」を満たした成果物を作成してください。

## STEP
1. 提供された「視察項目の詳細」を分析し、相手が直面している状況や視察の真の動機を言語化してください。
2. 「視察説明資料」の内容を精査し、1の分析結果に基づき、強調すべき箇所と補足すべき箇所を特定してください。
3. 視察のタイムラインに合わせ、相手の関心が高い順、または論理的な理解が進む順で、説明の「口述書（スクリプト）」を作成してください。
4. 専門用語は平易な言葉に置き換え、必要に応じて「ここだけの話」のような実感を伴うフレーズを挿入してください。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="27" placeholder="ルールを入力してください">
### ルール
- 話し言葉の徹底: 「〜です・ます」調を基本とし、一文を短く、リズム良く構成する。
- 構造化: 冒頭で結論や全体像を述べ、その後に詳細を説明するPREP法を意識する。
- 事実重視: 数値や具体的な事例を資料から正確に引用し、説得力を高める。

### 思考ステップ
1. Divergence（分析）: 視察項目の各文言から、相手の「悩み」を多角的に洗い出す。
2. Exploration（抽出）: 資料の中から、相手の悩みに直接答える「証拠（エビデンス）」を見つけ出す。
3. Convergence（統合）: 抽出した情報を、視察側の関心に沿って再構成し、ストーリーを作る。
4. Synthesis（生成）: 実際の口述場面を想定し、息継ぎや強調、問いかけを含む最終的な口述書を作成する。

### ガードレール
- 資料にない数値を推測で書かないこと。
- 行政としての責任の範囲を明確にし、断定できないことは「〜の傾向がある」「〜と考えている」といった表現に留める。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="16" placeholder="出力形式を入力してください">
- 出力はナラティブ形式とし、以下の章立てに従って出力してください。中学生でもわかる表現とする。
- ユーザーへの質問は一問一答とし、中学生でもわかるような表現にしてください。
--- Markdown
- 分析ログ: 視察側の背景・思いの推察結果（簡潔に）。
- 口述書本体: セクションごとの見出し、想定される所要時間、読み上げ原稿。
- 補足アドバイス: 質問が出やすいポイントや、資料の図表を指し示すタイミングの指示。
---
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>視察先からの「視察項目の詳細」</h3>
<textarea name="hensu1" id="hensu1" rows="15" placeholder="ここに視察先からの「視察項目の詳細」を入力してください。" class="variable-textarea" >
</textarea>
<h3>ユーザー作成の「視察説明資料」</h3>
<textarea name="hensu2" id="hensu2" rows="5" placeholder="ここにユーザー作成の「視察説明資料」を入力してください。" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="27" placeholder="を補足を入力してください">
### 補足
- 現場での質疑応答を想定した「想定問答」も、口述書の末尾に主要なものだけ3つ程度付記すると親切です。

### ネガティブ制約条件
- 生の思考プロセスをダラダラと見せず、ユーザーに有益な「分析結果」と「成果物」のみを提示してください。
- 検索や外部ツールの利用ができない環境である場合、できるふりをせず、持っている知識のみで構成してください。
- 「見せるための思考芝居」は排除し、実用的な作業ログのみを残してください。

### 失敗条件設計
- 資料の丸写し: 資料の文章をそのまま読み上げるだけの構成は、口述書として「誤り」と判定します。
- 意図の無視: 視察項目の核心（相手の悩み）に答えていない説明は、タスク未達とみなします。
- 優先順位の誤り: 制限時間がある場合、枝葉末節の説明に時間を割き、核心部分が薄くなる構成は避けてください。迷ったときは「相手の課題解決に直結する情報」を優先します。</textarea>
            </div>


        </form>
        <div class="button-group">
            <div class='btn2'>
                <a href="http://www.city.nanyo.yamagata.jp/dxchosei/5793">戻る</a>
            </div>
            <div class="btn-generate">
                <a href="#" id="generateButton">プロンプト作成</a>
                <div class="small-text">クリップボードにコピーされます。</div>
            </div>
        </div>
    </div>

<!-- JavaScript -->
<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##視察先からの「視察項目の詳細」=" + (formData.get('hensu1') || '特に指示無し') + "\n";
    communicationContent += "##ユーザー作成の「視察説明資料」=" + (formData.get('hensu2') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
