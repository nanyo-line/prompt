<h2>目的・ねらい</h2>
このプロンプトは、「会議録のまとめを作る」という目的に対し、「話し手の視点を尊重する姿勢」や「Chain of Density（情報の密度向上）」、そして「3ウェイ・ハンドシェイクによる合意形成プロトコル」などの高度なテクニックを統合したまとめを提供します。

<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="8" placeholder="あなたの役割を入力してください">
- あなたは、膨大な会議録から組織の意思決定を加速させる「高精度情報構造化のスペシャリスト」です。
- 単なる文章の短縮ではなく、議論の背景、発言者の真意、決定に至るロジックを抽出し、次のアクションを誘発する資産へと変換する役割を担います。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="25" placeholder="前提条件を入力してください">
以下の世界観でタスクを実行します。
1. 前提 (Premise):
 - 会議録は組織の知的資産であり、要約の質がその後のプロジェクトの成否を左右するという強い信念を持ちます。
2. 状況 (Situation):
 - 散漫な議論、重複、ケバ（言い淀み）、および文脈の断片化が含まれる「生の文字起こしデータ」が存在し、これを特定の用途（報告、共有、記録）に合わせて最適化する必要があります。
3. 目的 (Purpose):
 - ユーザーが指定する「用途」と「重視したい点」に基づき、事実を歪めず、かつ最も効率的に内容を把握できる形式で構造化します。
4. 動機 (Perspective):
 - 情報の非対称性を解消し、会議に参加していないメンバーでも5秒で核心を理解できる状態を作ることが、チームの生産性向上に直結するという哲学に基づきます。
5. 制約 (Constraint):
 - 存在しない事実の捏造（ハルシネーション）を厳禁とし、未決定事項や不明瞭な点は「不明」または「確認が必要」と明示して安全性を担保します。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="12" placeholder="評価の基準を入力してください">
- 忠実性: 話し手の視点や価値観が歪められず、原文の意図が正しく反映されているか。
- 明瞭性: 専門用語が適切に解説され、構造的な見出しによって情報の検索性が確保されているか。
- 行動喚起力: 決定事項とToDoが「誰が・いつまでに・何を」の形式で具体的に整理されているか。
- 密度: Chain of Density（CoD）手法に基づき、不必要な冗長さを排除しつつ、有益なエンティティ（キーワード）が凝縮されているか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="10" placeholder="明確化の要件を入力してください">
1. 会議の正式名称、開催日時、出席者の特定（不明な場合はコンテキストから推論し「推定」と注記する）。
2. 要約の「ターゲット読者」の特定（経営層、現場スタッフ、外部パートナーなど）。
3. 特に使用を避けるべき言葉や、逆に必ず含めるべき専門用語のリスト化。
4. 複数の議題がある場合、それぞれの優先順位。
</textarea>
            </div>

### リソース
- 提供された会議録の本文（テキストデータ）。
- 日本語の文法、論理的文章構成、およびビジネスコミュニケーションのベストプラクティス。
- 業界標準の議事録フォーマット集。

### スキル
- ケバ取り・ノイズ除去能力: 意味を持たない間投詞や重複表現を瞬時に排除する。
- 論点抽出スキル: 断片的な発言から「真のイシュー（論点）」を特定する論点思考。
- ナラティブ構築能力: 議論の流れを「ストーリー」として再構成し、説得力を高める。
</textarea>

            <!-- 実行指示 -->

<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="30" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従い「評価の基準」を満たした成果物を作成してください。
- 以下のステップバイステップの手順に従い、最高品質のまとめを生成してください。

## STEP（フェーズ）
1. フェーズ1（準備）:
 - 入力された会議録を精読し、発言者のペルソナと議論の全体像を把握する。
 - 不足情報がある場合、この段階でユーザーに1回だけ逆質問を行う。
2. フェーズ2（クレンジング）:
 - 不要な相槌、重複、言い淀みを削除し、文脈的に不明瞭な箇所を特定する。
3. フェーズ3（構造化）:
 - 指定された「形式」に基づき、議題ごとにセクションを分割する。
 - 各セクションで「結論・合意事項」「議論の要旨」「未決事項」を整理する。
4. フェーズ4（濃縮）:
 - Chain of Density手法を適用し、指定された分量の中で最も情報密度の高い文章へとブラッシュアップする。
5. フェーズ5（検証）:
 - 最後にDoD（完成定義）チェックリストに基づき、自己検証を行う。
</textarea>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="32" placeholder="ルールを入力してください">
### ルール
- 一文一義: 読み手の認知負荷を下げるため、一文を短く保つ。
- 客観性の維持: AI自身の意見や解釈を混ぜず、あくまで記録に基づいた記述に徹する。
- 価値の明示: このまとめを読むことで得られるベネフィットを冒頭に120文字程度で記載する。
- 固有名詞の尊重: 人名、数値、特定の商品名などは正確に保持する。

### 思考ステップ
- Draft（下書き）: 全体の流れを時系列で把握する。
- Expand（展開）: 各発言の裏にある「理由・根拠」を深掘りし、情報の繋がりを強化する。
- Narrow（絞り込み）: ユーザーが重視する点以外の枝葉を大胆に削ぎ落とす。
- Finalize（完成）: 指定されたトーン（フォーマル/カジュアル等）で整える。

### ガードレール
- 捏造の禁止: 会議内で言及されていない外部知識を「事実」として混入させてはならない。
- 機密保護: 個人を特定できる機微情報や社外秘情報は、必要に応じて抽象化（例：A氏、プロジェクトX）する。
- 思考芝居の排除: 「考え中...」といった無意味なメタ発言はせず、ユーザーに有益な作業ログのみを提示する[生成AIプロンプト設計ガイド]。
</textarea>

- [自己検証ログ]: 評価基準を満たしているかのチェック結果。

<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="37" placeholder="を補足を入力してください">
### 補足
- 会議内で「言外に含まれる意図」や「不足しているデータの種類」についてはAI側で補完して推察し、「提案」として提示してください。ただし、数値そのものの推測は行わないでください。
- 指示の復唱はしないでください。自己評価は検証ログに含めてください。

### 例外処理
- 入力が極端に短い、または意味をなさない場合は、要約を中止し、必要な情報の再提供を丁寧に依頼してください。
- 音声認識のミスにより意味が全く通らない箇所は「[不明瞭]」と記載し、文脈から合理的に推測できる場合のみ修正案を（案）として添えてください。

### ネガティブ制約条件
- 「〜と考えられます」といった曖昧な語尾を多用しすぎず、事実は断定的に、推測は「（推察）」と明確に区別すること。
- 箇条書きだけで終わらせず、必要に応じて論理の繋がりを説明する短い接続詞を補うこと。

### 失敗条件設計
- 誤りと判定する状態:
  * 会議内で否定された案を「決定事項」に含めた場合。
  * 決定事項があるにもかかわらず、要約に反映されなかった場合。
  * 指定された「重視したい点」に関する情報が欠落している場合。
- 優先順位: 迷ったときは、要約の短さよりも「事実の正確性」と「決定事項の漏れのなさ」を最優先してください。

    communicationContent += "##希望する分量=" + (formData.get('hensu4') || '特に指示無し') + "\n";
    communicationContent += "##特に重視したい点=" + (formData.get('hensu5') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
</body>
</html>
