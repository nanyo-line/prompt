<!DOCTYPE html>
<html lang="ja">
<head>

    <title>#785 MANUS最適化ライブラリ構築プロンプト</title>
    <style>
        /* === スタイル設定 === */
        
        /* 基本ページ設定 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #FFF;
        }
        /* メインコンテナのスタイル */
        .container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 3px 5px 15px -5px #777777;

        }
        /* 各種見出し・ボタンのスタイル設定 */

        }
        .togglable-section {
                /* display: none; Removed */
            }
        label {
            display: inline-block;
            margin-left: 5px;

        }
        input[type="text"], select, textarea {

            margin-top: 5px;

/* === 入力エリアの色設定 === */

}

<body>

<!-- === メインのHTML構造 === -->
<div class="container">
    <div class="box-title">
    <span class="title-text">#785 MANUS最適化ライブラリ構築プロンプト</span>
    <span id="toggleIcon" style="cursor:pointer;">☰</span>
</div>
    <div class="form-content">
        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、AIに「思考のデザイン」を行わせることで、MANUSの自律的なポイント消費をユーザーが制御できるように設計しています。 また、ネガティブ制約により、MANUSが「わからないこと」に対して推論をループさせるリスクを軽減しています。
</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="10" placeholder="あなたの役割を入力してください">
- あなたは生成AIのポテンシャルを極限まで引き出す、プロフェッショナルなプロンプトエンジニアであり、自律型エージェント「MANUS」の仕様とポイント効率を熟知したナレッジマネジメントの専門家です。
- ユーザーが持つ特定のテーマについて、MANUSが一発で高品質かつ体系的な知識ライブラリを生成できるよう、入力欄にそのまま貼り付けられる「最高密度の指示文」を設計してください。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="23" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - MANUSは毎日400ポイントの限定リソースで稼働しており、指示が曖昧な場合に発生する「再推論」や「確認のやり取り」は、ライブラリ構築における最大の損失（ポイント浪費）であるという事実。
2. 状況 (Situation):
 - ユーザーは特定の分野に関する深い知見や構造化された情報をMANUSに集約させたいが、ポイント消費を恐れて最小限の入力回数で完結させる必要がある。
3. 目的 (Purpose):
 - MANUSの自律的な思考能力（CoT: Chain of Thought）を抑制せず、かつ実行経路を最短化する「動的な指示書」を作成し、ポイント内で完結する知識の宝庫を創出する。
4. 視点 (Perspective):
 - 効率性（コスト最小化）と深さ（知識の構造化）を両立させる「情報アーキテクト」の視点。
5. 制約 (Constraint):
 - 再質問が必要な曖昧な表現、過度に冗長な前置き、ポイントを無駄にする広範すぎる探索指示を排除し、アウトプットの形式を厳密に固定する。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="8" placeholder="評価の基準を入力してください">
- MANUSが「何をするか」に迷わず、一度の実行でライブラリの骨格から詳細まで出力できているか。
- 提示されたプロンプトが、MANUSの思考プロセスを適切にガイドし、ポイント効率が最適化されているか。
- 出力された知識が、体系的（序論・本論・結論・FAQ等）に整理されているか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="11" placeholder="明確化の要件を入力してください">
1. 構築したい知識ライブラリの「具体的なテーマ」を定義する。
2. ライブラリに含めるべき「必須の項目（目次）」を提示する。
3. 想定される読者の知識レベル（初心者か専門家か）を指定する。
4. MANUSに求める最終的な出力形式（Markdown、構造化テキスト等）を明示する。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="7" placeholder="リソースを入力してください">
- 参照資料に記載された「構造化プロンプトの構成要素（Request, Role, Constraint等）」。
- MANUSのポイント制限に関するユーザーの状況。
- 思考と推論を深めるための「ステップバイステップ」の論理構造。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="20" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従いSTEP1～STEP3をステップバイステップで実行し、「評価の基準」を満たした成果物を作成してください。

## STEP
1. 以下の「ユーザー入力」にあるテーマに基づき、MANUSへ入力するためのプロンプトを生成してください。
2. その際、MANUSに対して「まず全体像を俯瞰し、次に各要素の深掘りを行い、最後にそれらを体系的なMarkdown形式で出力せよ」という一連の自律的タスクを、途中の確認を挟まずに実行させるための「一撃必殺」の命令セットを構成してください。
3. AIの能力を真に引き出すため、段階的な指示をあえて省略し、モデルに「ポイント消費を最小化しながら最高精度の回答を出す推論ルート」を自ら設計させるメタ指示も含めてください。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="24" placeholder="ルールを入力してください">
- 出力するプロンプト案は、MANUSが理解しやすいようにMarkdownの見出し（# や ##）を活用した構造的な記述にする。
- 「です・ます」調を避け、命令形または事実の記述に徹することでトークン数（ポイント消費に関わる量）を節約する。
- 不確実な情報は「不明」と明記させ、勝手なハルシネーションを防止する制約を入れる。

### 思考ステップ
1. テーマ分析: ユーザーが入力したテーマの核心を捉え、どのような知識構造（タクソノミー）が必要かを特定する。
2. ポイント節約設計: 再確認が必要な箇所を予測し、それを先回りしてプロンプト内で定義する。
3. 推論プロセスのデザイン: MANUSが「なぜこのライブラリが必要か」という目的意識（Why）を持って思考できるように指示を味付けする。
4. 最終検証: 生成したプロンプトが「ポイント内で収まるか」および「散文形式での出力制御」に従っているかを再点検する。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="6" placeholder="出力形式を入力してください">
1. MANUS用入力プロンプト本体: コピペしてそのまま使える形式。
2. プロンプトの設計意図: なぜこの構成がポイント節約と高品質化に繋がるのかの解説（散文形式）。
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>特定のテーマや、解決したい課題</h3>
<textarea name="hensu1" id="hensu1" rows="15" placeholder="ここに特定のテーマや、解決したい課題を入力してください。（地方自治体のDX推進における失敗事例と対策、現代のAIエンジニアに必須の数学的知識、など）" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="18" placeholder="を補足を入力してください">
- MANUSは複雑な指示ほど自律的な処理を繰り返す傾向があるため、制約は「禁止」よりも「推奨されるルート」として提示してください。
- 必要に応じて「逆質問を一度にまとめて行うよう」指示に加えることで、往復回数を減らせます。
- 指示の復唱はしないでください。
- 自己評価はしないでください。
- 結論やまとめは書かないでください。
- すべて日本語で出力してください

### ネガティブ制約条件
- 表形式での出力は行わないこと。
- 「適宜」「いい感じに」といった曖昧な副詞を使用しないこと。
- MANUSに対して、ポイント消費を増大させるような「外部ウェブサイトの無限クロール」を指示しないこと。
</textarea>
            </div>


        </form>
        <div class="button-group">
            <div class='btn2'>
                <a href="http://www.city.nanyo.yamagata.jp/dxchosei/5793">戻る</a>
            </div>
            <div class="btn-generate">
                <a href="#" id="generateButton">プロンプト作成</a>
                <div class="small-text">クリップボードにコピーされます。</div>
            </div>
        </div>
    </div>
<script type="text/javascript" src="/download_prompt/download.php?dsp_count=785"></script>
</div>

<!-- JavaScript -->
<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##特定のテーマや、解決したい課題=" + (formData.get('hensu1') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
